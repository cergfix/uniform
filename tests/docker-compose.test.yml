services:
  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: uniform_test
      MYSQL_USER: uf_test
      MYSQL_PASSWORD: uf_pass
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 15

  phpfpm:
    image: php:8.3-fpm
    ports:
      - "9123:9000"
    volumes:
      - ./docker/php-fpm-pool.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./docker/echo.php:/var/www/test/echo.php:ro
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s

  nginx:
    image: nginx:stable
    ports:
      - "8402:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/nginx.pid"]
      interval: 2s
      timeout: 5s
      retries: 10
